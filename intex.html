<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сергиенко Александр | Портфолио</title>

    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
    <div class="container">
        <h1>Сергиенко Александр</h1>
        <nav>
            <button id="menu-toggle" class="mobile-menu-toggle">МЕНЮ</button>
            <ul id="main-nav-list">
                <li><a href="#about" class="nav-link active">О СЕБЕ</a></li>
                <li><a href="#skills" class="nav-link">НАВЫКИ</a></li>
                <li><a href="#portfolio" class="nav-link">ПОРТФОЛИО</a></li>
                <li><a href="#" id="open-contact-modal" class="nav-link">СВЯЗЬ</a></li>
            </ul>
        </nav>
    </div>
</header>

<main>
    <section id="portfolio" class="section">
        <div class="container">
            <h2>ПОРТФОЛИО</h2>
            <div class="portfolio-grid" id="portfolio-output">
            </div>
        </div>
    </section>

    <section id="contacts" class="section">
    </section>

</main>

<footer>
</footer>

<button id="back-to-top" title="Наверх">↑</button>

<div id="contact-modal" class="modal">
    <div class="modal-content">
        <span class="close-button">&times;</span>
        <h3>ФОРМА ОБРАТНОЙ СВЯЗИ</h3>
        <form id="contact-form">
            <div class="form-group">
                <label for="name">ИМЯ:</label>
                <input type="text" id="name" name="name" required data-validation="name">
                <div class="error-message name-error"></div>
            </div>
            <div class="form-group">
                <label for="email">EMAIL:</label>
                <input type="email" id="email" name="email" required data-validation="email">
                <div class="error-message email-error"></div>
            </div>
            <div class="form-group">
                <label for="message">СООБЩЕНИЕ:</label>
                <textarea id="message" name="message" required data-validation="message"></textarea>
                <div class="error-message message-error"></div>
            </div>
            <button type="submit" id="submit-btn">ОТПРАВИТЬ</button>
            <div id="form-message"></div>
        </form>
    </div>
</div>


<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="js/script.js"></script>
</body>
</html>
